<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ERQA Reports</title>
<style>
:root{--bg:#f6f7f9;--panel:#fff;--text:#172026;--muted:#65727e;--line:#d9e0e5;--line2:#c1cbd3;--accent:#2e5f9e;--ok:#157f5a;--shadow:0 10px 30px rgba(27,39,51,.08)}
*{box-sizing:border-box}body{margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);letter-spacing:0}header{background:#fff;border-bottom:1px solid var(--line)}.wrap{max-width:1180px;margin:0 auto;padding:24px}h1{margin:0;font-size:28px;line-height:1.15}.meta{margin-top:8px;color:var(--muted);font-size:13px}.toolbar{display:grid;grid-template-columns:minmax(160px,1fr) minmax(160px,1fr) minmax(260px,1.5fr);gap:10px;margin-top:18px}input,select{width:100%;min-height:38px;border:1px solid var(--line2);border-radius:7px;background:#fff;padding:0 10px;font:inherit;color:inherit}.cards{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;margin:18px 0 14px}.card,.panel{background:var(--panel);border:1px solid var(--line);border-radius:8px;box-shadow:var(--shadow)}.card{padding:14px 16px;min-height:88px}.label{color:var(--muted);font-size:12px;margin-bottom:7px}.value{font-size:26px;line-height:1.1;font-weight:760;white-space:nowrap}.sub{margin-top:7px;color:var(--muted);font-size:12px}.panel{overflow:hidden}.table-wrap{overflow:auto}table{width:100%;border-collapse:separate;border-spacing:0;min-width:920px;font-size:13px}th,td{padding:12px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}th{background:#f9fbfc;color:#42515c;font-weight:720;white-space:nowrap}tr:hover td{background:#fbfcfd}.num{text-align:right;font-variant-numeric:tabular-nums}.badge{display:inline-flex;align-items:center;min-height:24px;padding:0 8px;border-radius:999px;font-size:12px;font-weight:700;background:#e8f0fb;color:var(--accent);white-space:nowrap}a{color:var(--accent);font-weight:700;text-decoration:none}a:hover{text-decoration:underline}code{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:12px}.empty{padding:34px 18px;text-align:center;color:var(--muted)}@media(max-width:820px){.toolbar,.cards{grid-template-columns:1fr}.wrap{padding:18px 14px}}
</style>
</head>
<body>
<header><div class="wrap"><h1>ERQA Reports</h1><div class="meta">统一入口 · 当前目录布局：<code>reports/&lt;run_id&gt;.html</code> + <code>reports/report_assets/&lt;run_id&gt;/</code></div><div class="toolbar"><select id="modelFilter"><option value="all">全部模型</option></select><select id="dateFilter"><option value="all">全部日期</option></select><input id="searchBox" type="search" placeholder="搜索 run / model / path" /></div></div></header>
<main><div class="wrap"><section class="cards"><div class="card"><div class="label">Runs</div><div class="value" id="runCount">0</div><div class="sub">当前过滤结果</div></div><div class="card"><div class="label">Best Accuracy</div><div class="value" id="bestAcc">0%</div><div class="sub" id="bestRun">-</div></div><div class="card"><div class="label">Total Samples</div><div class="value" id="sampleCount">0</div><div class="sub">processed 汇总</div></div></section><section class="panel"><div class="table-wrap"><table><thead><tr><th>Run</th><th>Model</th><th>Date</th><th class="num">Accuracy</th><th class="num">Correct</th><th class="num">Samples</th><th>Report</th><th>Raw Output</th></tr></thead><tbody id="runsBody"></tbody></table><div id="empty" class="empty" hidden>没有符合条件的报告</div></div></section></div></main>
<script>
const runs=[{"benchmark": "ERQA", "run_id": "eas_qwen36_27_sglang_20260608", "model": "eas_qwen36_27_sglang", "date": "2026-06-08", "created_at": "2026-06-08 19:59:20", "report": "reports/eas_qwen36_27_sglang_20260608.html", "latest_alias": "reports/erqa_report.html", "asset_dir": "reports/report_assets/eas_qwen36_27_sglang_20260608", "source_output_dir": "outputs/eas_qwen36_27_sglang", "result_jsonl": "outputs/eas_qwen36_27_sglang/full_20260608.jsonl", "summary_json": "outputs/eas_qwen36_27_sglang/full_20260608.summary.json", "processed": 400, "correct": 175, "accuracy": 0.4375, "single_image": {"total": 287, "correct": 130, "accuracy": 0.4529616724738676}, "multi_image": {"total": 113, "correct": 45, "accuracy": 0.39823008849557523}, "by_question_type": {"Action Reasoning": {"total": 72, "correct": 33, "accuracy": 0.4583333333333333}, "Multi-view Reasoning": {"total": 37, "correct": 10, "accuracy": 0.2702702702702703}, "Other": {"total": 14, "correct": 3, "accuracy": 0.21428571428571427}, "Pointing": {"total": 34, "correct": 15, "accuracy": 0.4411764705882353}, "Spatial Reasoning": {"total": 84, "correct": 39, "accuracy": 0.4642857142857143}, "State Estimation": {"total": 55, "correct": 28, "accuracy": 0.509090909090909}, "Task Reasoning": {"total": 38, "correct": 16, "accuracy": 0.42105263157894735}, "Trajectory Reasoning": {"total": 66, "correct": 31, "accuracy": 0.4696969696969697}}}];const $=id=>document.getElementById(id);const modelFilter=$('modelFilter'),dateFilter=$('dateFilter'),searchBox=$('searchBox');
const clean=v=>v===null||v===undefined||v===''?'-':String(v);const pct=v=>Number.isFinite(Number(v))?`${(Number(v)*100).toFixed(2)}%`:'-';const esc=v=>clean(v).replace(/[&<>'"]/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[ch]));const localHref=p=>clean(p).replace(/^reports\//,'');
function populate(){for(const m of [...new Set(runs.map(r=>clean(r.model)))].sort())modelFilter.appendChild(new Option(m,m));for(const d of [...new Set(runs.map(r=>clean(r.date)))].sort().reverse())dateFilter.appendChild(new Option(d,d));}
function filtered(){const q=searchBox.value.trim().toLowerCase();return runs.filter(r=>{if(modelFilter.value!=='all'&&clean(r.model)!==modelFilter.value)return false;if(dateFilter.value!=='all'&&clean(r.date)!==dateFilter.value)return false;if(!q)return true;return [r.run_id,r.model,r.report,r.source_output_dir].map(clean).join(' ').toLowerCase().includes(q);});}
function render(){const data=filtered().sort((a,b)=>clean(b.date).localeCompare(clean(a.date))||clean(a.run_id).localeCompare(clean(b.run_id)));$('runCount').textContent=data.length.toLocaleString();$('sampleCount').textContent=data.reduce((s,r)=>s+(Number(r.processed)||0),0).toLocaleString();const best=data.reduce((acc,r)=>Number(r.accuracy)>Number(acc?.accuracy??-1)?r:acc,null);$('bestAcc').textContent=best?pct(best.accuracy):'0%';$('bestRun').textContent=best?best.run_id:'-';const body=$('runsBody');body.innerHTML='';$('empty').hidden=data.length>0;const frag=document.createDocumentFragment();for(const r of data){const tr=document.createElement('tr');tr.innerHTML=`<td><span class="badge">${esc(r.run_id)}</span></td><td>${esc(r.model)}</td><td>${esc(r.date)}</td><td class="num"><strong>${pct(r.accuracy)}</strong></td><td class="num">${esc(r.correct)}</td><td class="num">${esc(r.processed)}</td><td><a href="${esc(localHref(r.report))}">打开报告</a></td><td><code>${esc(r.source_output_dir)}</code></td>`;frag.appendChild(tr);}body.appendChild(frag);}
for(const input of [modelFilter,dateFilter,searchBox]){input.addEventListener('input',render);input.addEventListener('change',render)}populate();render();
</script>
</body></html>
